<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live POS System</title>

<style>
body {
  font-family: Arial;
  margin: 15px;
  background: #f4f6f9;
}

h2 { text-align:center; }

button {
  padding:10px;
  margin:5px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:5px;
}

.table-container {
  overflow-x:auto;
}

table {
  width:100%;
  min-width:800px;
  border-collapse:collapse;
  background:white;
}

th,td {
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th { background:#007bff; color:white; }

input,select {
  width:100%;
  padding:5px;
}

.total-box {
  margin-top:15px;
  font-size:18px;
  text-align:right;
}
</style>
</head>

<body>

<h2>📊 Live POS System</h2>

<button onclick="addRow()">Add Item</button>

<div class="table-container">
<table id="posTable">
<thead>
<tr>
  <th>Product</th>
  <th>Qty</th>
  <th>Price</th>
  <th>Total</th>
  <th>Payment</th>
  <th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="total-box">
<strong>Grand Total: ₱ <span id="grandTotal">0</span></strong>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>

/* 🔑 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const products = {
  "Coke": 20,
  "Pepsi": 18,
  "Water": 10,
  "Chips": 15
};

let localData = {};
let typingTimer;

/* ADD ROW */
function addRow(data = null, id = null) {
  const tbody = document.querySelector("#posTable tbody");

  const rowId = id || Date.now() + Math.random();

  const row = document.createElement("tr");
  row.dataset.id = rowId;

  row.innerHTML = `
    <td>
      <select onchange="update('${rowId}')">
        ${Object.keys(products).map(p =>
          `<option ${data?.product === p ? "selected" : ""}>${p}</option>`
        ).join("")}
      </select>
    </td>

    <td><input type="number" value="${data?.qty || 1}" oninput="update('${rowId}')"></td>
    <td><input type="number" value="${data?.price || 0}" oninput="update('${rowId}')"></td>

    <td class="total">0</td>

    <td>
      <select onchange="update('${rowId}')">
        <option ${data?.payment === "Cash" ? "selected" : ""}>Cash</option>
        <option ${data?.payment === "GCash" ? "selected" : ""}>GCash</option>
        <option ${data?.payment === "BPI" ? "selected" : ""}>BPI</option>
      </select>
    </td>

    <td><button onclick="deleteRow('${rowId}')">X</button></td>
  `;

  tbody.appendChild(row);

  if (!data) pushUpdate();
}

/* UPDATE (OPTIMIZED DEBOUNCE) */
function update(id) {
  clearTimeout(typingTimer);

  typingTimer = setTimeout(() => {
    pushUpdate();
  }, 300);
}

/* DELETE ROW */
function deleteRow(id) {
  const row = document.querySelector(`[data-id="${id}"]`);
  if (row) row.remove();
  pushUpdate();
}

/* COLLECT DATA */
function collectData() {
  const rows = document.querySelectorAll("#posTable tbody tr");

  const data = [];

  rows.forEach(r => {
    const cells = r.querySelectorAll("td");

    const product = cells[0].querySelector("select").value;
    const qty = Number(cells[1].querySelector("input").value);
    const price = Number(cells[2].querySelector("input").value);
    const payment = cells[4].querySelector("select").value;

    data.push({ product, qty, price, payment });
  });

  return data;
}

/* PUSH TO FIREBASE */
function pushUpdate() {
  const data = collectData();
  db.ref("pos").set(data);
}

/* RENDER */
function render(data) {
  const tbody = document.querySelector("#posTable tbody");
  tbody.innerHTML = "";

  let grand = 0;

  if (!data) return;

  data.forEach((item, i) => {
    addRow(item, i);

    const row = tbody.lastChild;
    const total = item.qty * item.price;
    row.querySelector(".total").innerText = total.toFixed(2);

    grand += total;
  });

  document.getElementById("grandTotal").innerText = grand.toFixed(2);
}

/* REALTIME LISTENER */
db.ref("pos").on("value", snap => {
  const data = snap.val() || [];
  render(data);
});

</script>

</body>
</html>
