<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Sales Tally</title>

<style>
body { font-family: Arial; margin: 30px; background: #f4f6f9; }

h1 { text-align:center; }

button {
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
  background:#007bff;
  color:white;
  border:none;
  border-radius:5px;
}

.table-container { overflow-x:auto; }

table {
  width:100%;
  min-width:900px;
  border-collapse:collapse;
  background:white;
}

th,td {
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th {
  background:#007bff;
  color:white;
}

input,select {
  width:100%;
  padding:5px;
}

.total-box, .payment-summary {
  margin-top:15px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>Business Sales Tally</h1>

<button onclick="addRow()">Add Item</button>
<button onclick="clearAll()">Clear</button>

<div class="table-container">
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Product</th>
  <th>Qty</th>
  <th>Price</th>
  <th>Total</th>
  <th>Payment</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="total-box">
<strong>Grand Total: ₱ <span id="grand">0</span></strong>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>

/* 🔑 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const products = {
  "Coke":20,
  "Pepsi":18,
  "Water":10,
  "Chips":15
};

let typingTimer;

/* ADD ROW */
function addRow(data=null) {
  const tbody = document.getElementById("tbody");

  const row = document.createElement("tr");

  row.innerHTML = `
    <td><input value="${data?.name||""}" oninput="update()"></td>

    <td>
      <select onchange="autoFillPrice(this); update()">
        ${Object.keys(products).map(p =>
          `<option ${data?.product===p?"selected":""}>${p}</option>`
        ).join("")}
      </select>
    </td>

    <td><input type="number" value="${data?.qty||1}" oninput="update()"></td>

    <td><input type="number" value="${data?.price||0}" oninput="update()"></td>

    <td class="total">0</td>

    <td>
      <select oninput="update()">
        <option ${data?.payment==="Cash"?"selected":""}>Cash</option>
        <option ${data?.payment==="GCash"?"selected":""}>GCash</option>
        <option ${data?.payment==="BPI"?"selected":""}>BPI</option>
      </select>
    </td>

    <td><button onclick="this.closest('tr').remove(); update()">X</button></td>
  `;

  tbody.appendChild(row);

  if(!data) pushData();
}

/* AUTO PRICE */
function autoFillPrice(select){
  const row = select.closest("tr");
  const product = select.value;
  row.cells[3].querySelector("input").value = products[product];
}

/* COLLECT DATA */
function getData(){
  const rows = document.querySelectorAll("#tbody tr");
  const data = [];

  rows.forEach(r=>{
    const tds = r.querySelectorAll("td");

    data.push({
      name: tds[0].querySelector("input").value,
      product: tds[1].querySelector("select").value,
      qty: Number(tds[2].querySelector("input").value),
      price: Number(tds[3].querySelector("input").value),
      payment: tds[5].querySelector("select").value
    });
  });

  return data;
}

/* UPDATE (OPTIMIZED) */
function update(){
  clearTimeout(typingTimer);

  typingTimer = setTimeout(()=>{
    pushData();
  }, 300);
}

/* SEND TO FIREBASE */
function pushData(){
  db.ref("pos").set(getData());
}

/* RENDER */
function render(data){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  let total = 0;

  if(!data) return;

  data.forEach(d=>{
    addRow(d);

    const t = d.qty * d.price;
    total += t;

    tbody.lastChild.querySelector(".total").innerText = t.toFixed(2);
  });

  document.getElementById("grand").innerText = total.toFixed(2);
}

/* REALTIME LISTENER */
db.ref("pos").on("value", snap=>{
  render(snap.val() || []);
});

/* CLEAR */
function clearAll(){
  db.ref("pos").remove();
}

</script>

</body>
</html>
