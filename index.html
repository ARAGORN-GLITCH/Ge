<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync Test</title>
</head>

<body>

<h2>Live Sync</h2>
<input id="input" placeholder="Type...">
<p id="output">Connecting...</p>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const input = document.getElementById("input");
const output = document.getElementById("output");

/* SHOW STATUS */
output.innerText = "Trying to connect...";

/* WRITE */
input.addEventListener("input", () => {
  db.ref("sharedText").set(input.value);
});

/* READ */
db.ref("sharedText")
.on("value", snap => {
  const val = snap.val();

  if (val === null) {
    output.innerText = "Connected ✔ (no data yet)";
  } else {
    output.innerText = val;
    input.value = val;
  }
}, error => {
  output.innerText = "Firebase error: " + error.message;
});
</script>

</body>
</html>
