<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sync Notes</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f4f6f9;
  text-align: center;
}

input {
  width: 90%;
  padding: 12px;
  font-size: 16px;
  margin-top: 20px;
}

.box {
  margin-top: 20px;
  font-size: 20px;
  background: white;
  padding: 15px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>🌐 Live Sync System</h2>

<input id="textInput" placeholder="Type here...">
<div class="box" id="output">Waiting...</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
/* 🔥 PUT YOUR FIREBASE CONFIG HERE */
const firebaseConfig = YOUR_FIREBASE_CONFIG_HERE;

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* SAVE DATA */
document.getElementById("textInput").addEventListener("input", function () {
  db.ref("sharedText").set(this.value);
});

/* REAL-TIME LISTENER */
db.ref("sharedText").on("value", (snapshot) => {
  const value = snapshot.val() || "";
  document.getElementById("output").innerText = value;
  document.getElementById("textInput").value = value;
});
</script>

</body>
</html>
